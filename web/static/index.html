<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#060610">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cockpit">
  <meta name="description" content="Private, read-only Hermes Cockpit companion dashboard.">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/cockpit-180.png">
  <link rel="stylesheet" href="/styles.css">
  <title>Cockpit — Hermes</title>
</head>
<body>
  <div class="grid" aria-hidden="true"></div><div class="scan" aria-hidden="true"></div>
  <main class="shell">
    <header class="hero">
      <div class="core" aria-hidden="true"><i></i><i></i><i></i></div>
      <div><p class="eyebrow">Hermes command interface</p><h1>COCKPIT</h1><p class="host" id="hostname">Connecting…</p></div>
      <div class="connection"><span id="status-dot"></span><span id="connection-state">LIVE</span></div>
    </header>
    <section class="metrics" aria-label="Live system metrics">
      <article class="card cyan"><p>CPU LOAD</p><strong id="cpu">—</strong><small id="cpu-detail">—</small></article>
      <article class="card purple"><p>MEMORY</p><strong id="memory">—</strong><small id="memory-detail">—</small></article>
      <article class="card orange"><p>DISK</p><strong id="disk">—</strong><small id="disk-detail">—</small></article>
      <article class="card green"><p>ACTIVE MODEL</p><strong class="model" id="model">—</strong><small id="model-detail">—</small></article>
    </section>
    <section class="status-card"><div><span class="label">UPTIME</span><strong id="uptime">—</strong></div><div><span class="label">TAILNET</span><strong id="tailnet">—</strong></div><div><span class="label">LAST UPDATE</span><strong id="updated">—</strong></div></section>
    <p class="note">Private, read-only companion · Access through Tailscale HTTPS</p>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
